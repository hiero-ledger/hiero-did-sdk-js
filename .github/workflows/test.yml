name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  checks: write
  pull-requests: write
  contents: write

jobs:
  test:
    if: github.event.pull_request.draft == false
    runs-on: hl-dsdk-js-lin-md
    strategy:
      matrix:
        node: [20, 22, 24]
    name: Run tests [Node v${{ matrix.node }}]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node and install dependencies
        uses: ./.github/actions/setup-npm-env
        with:
          node-version: ${{ matrix.node }}

#      - name: Prepare Hiero Solo
#        id: solo
#        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # v0.17
#        with:
#          installMirrorNode: true
#          hieroVersion: v0.65.0
#          mirrorNodeVersion: v0.138.0
#          grpcProxyPort: 8080

      - name: Run tests
        timeout-minutes: 30
        env:
          HEDERA_OPERATOR_ID: ${{ secrets.HEDERA_OPERATOR_ID }}
          HEDERA_OPERATOR_KEY: ${{ secrets.HEDERA_OPERATOR_KEY }}
#          HEDERA_NETWORK: local-node
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: pnpm test:ci

      - name: Report coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json
